<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nachrichten Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            width: 400px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        h1 {
            text-align: center;
            font-size: 20px;
        }
        textarea {
            resize: none;
            height: 60px;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            padding: 8px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }
        .messages {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .message {
            background: #f1f1f1;
            padding: 6px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .counter {
            font-size: 12px;
            margin-bottom: 8px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nachrichten Board</h1>
    <div class="counter" id="counter">Du kannst noch 5 Nachrichten schreiben.</div>
    <textarea id="messageInput" placeholder="Deine Nachricht..."></textarea>
    <button id="sendButton">Senden</button>
    <div class="messages" id="messages"></div>
</div>

<script>
    const maxMessages = 5;
    let messageCount = 0;

    const input = document.getElementById("messageInput");
    const button = document.getElementById("sendButton");
    const messagesDiv = document.getElementById("messages");
    const counter = document.getElementById("counter");

    button.addEventListener("click", () => {
        const text = input.value.trim();
        if (text === "" || messageCount >= maxMessages) return;

        const messageElement = document.createElement("div");
        messageElement.classList.add("message");
        messageElement.textContent = text;

        messagesDiv.appendChild(messageElement);
        input.value = "";

        messageCount++;
        const remaining = maxMessages - messageCount;
        counter.textContent = remaining > 0
            ? `Du kannst noch ${remaining} Nachrichten schreiben.`
            : "Du hast dein Limit erreicht.";

        if (messageCount >= maxMessages) {
            button.disabled = true;
            input.disabled = true;
        }
    });
</script>

</body>
</html>

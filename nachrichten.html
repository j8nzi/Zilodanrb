<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Öffentliche Textwand</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 80px;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
    }
    .message {
      border-bottom: 1px solid #ccc;
      padding: 8px 0;
    }
    #info {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Öffentliche Textwand</h1>
  <p>Jeder darf nur 5 Nachrichten pro Tag schreiben.</p>

  <textarea id="messageInput" placeholder="Deine Nachricht..."></textarea>
  <br>
  <button onclick="sendMessage()">Senden</button>
  <p id="info"></p>

  <h2>Nachrichten:</h2>
  <div id="messages"></div>

  <script>
    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function loadMessages() {
      const messages = JSON.parse(localStorage.getItem('messages') || '[]');
      const container = document.getElementById('messages');
      container.innerHTML = '';

      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message';
        div.textContent = msg.text + " (" + msg.date + ")";
        container.appendChild(div);
      });
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      const today = getToday();
      const messages = JSON.parse(localStorage.getItem('messages') || '[]');
      const userCountData = JSON.parse(localStorage.getItem('dailyCount') || '{}');

      if (!userCountData[today]) {
        userCountData[today] = 0;
      }

      if (userCountData[today] >= 5) {
        document.getElementById('info').textContent = "Du hast heute schon 5 Nachrichten gesendet.";
        return;
      }

      messages.push({ text: text, date: today });
      userCountData[today]++;

      localStorage.setItem('messages', JSON.stringify(messages));
      localStorage.setItem('dailyCount', JSON.stringify(userCountData));

      input.value = '';
      document.getElementById('info').textContent = "Nachricht gesendet!";
      loadMessages();
    }

    loadMessages();
  </script>
</body>
</html>
